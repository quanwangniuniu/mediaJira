# Lighthouse CI — runs against a full Docker stack on branch `lighthouse-ci-test`.
# Stack: wait for deps → migration check + migrate → Lighthouse (no backend/frontend test suite).
#
# Repository secrets (Settings → Secrets → Actions):
#   LHCI_AUTH_EMAIL, LHCI_AUTH_PASSWORD — used to register (if new) and log in via the Lighthouse helper scripts.
#
# PRs from forks do not receive secrets; Lighthouse auth may fail.
name: Lighthouse CI

on:
  push:
    branches: [lighthouse-ci-test]
  pull_request:
    branches: [lighthouse-ci-test]

concurrency:
  group: lighthouse-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          tags: mediajira-backend:${{ github.sha }}
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          tags: mediajira-frontend:${{ github.sha }}
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create CI environment file
        run: |
          cat > .env << EOF
          SECRET_KEY=test-secret-key-for-ci-${{ github.sha }}
          POSTGRES_DB=mediajira_test_db
          POSTGRES_USER=postgres
          POSTGRES_PASSWORD=test_password
          POSTGRES_PORT=5432
          DB_HOST=db
          API_BASE_URL=http://nginx
          DEBUG=False
          ALLOWED_HOSTS=localhost,127.0.0.1,0.0.0.0
          CELERY_BROKER_URL=redis://redis:6379/0
          CELERY_RESULT_BACKEND=redis://redis:6379/0
          CLAMAV_HOST=clamav
          CLAMAV_PORT=3310
          # Backend entrypoint uses opentelemetry-instrument; image lacks otlp_proto_grpc exporter.
          # Without these, startup logs show RuntimeError for otlp_proto_grpc (Daphne still runs).
          OTEL_SDK_DISABLED=true
          OTEL_TRACES_EXPORTER=none
          OTEL_METRICS_EXPORTER=none
          OTEL_LOGS_EXPORTER=none
          EOF

      - name: Start all services
        run: docker compose --profile ci --env-file .env up -d

      - name: wait for database and redis to be ready
        run: |
          # wait for database to be ready with proper health check
          echo "Waiting for database to be ready..."
          timeout=180
          counter=0
          while [ $counter -lt $timeout ]; do
            if docker compose --profile ci exec -T db pg_isready -U postgres > /dev/null 2>&1; then
              echo "Database is ready!"
              break
            fi
            echo "Database not ready yet, waiting... ($counter/$timeout)"
            sleep 2
            counter=$((counter + 2))
          done

          if [ $counter -eq $timeout ]; then
            echo "Database failed to start within $timeout seconds"
            docker compose --profile ci logs db
            exit 1
          fi

          # wait for redis to be ready
          echo "Waiting for Redis to be ready..."
          redis_timeout=30
          redis_counter=0
          while [ $redis_counter -lt $redis_timeout ]; do
            if docker compose --profile ci exec -T redis redis-cli ping > /dev/null 2>&1; then
              echo "Redis is ready!"
              break
            fi
            echo "Redis not ready yet, waiting... ($redis_counter/$redis_timeout)"
            sleep 1
            redis_counter=$((redis_counter + 1))
          done

          if [ $redis_counter -eq $redis_timeout ]; then
            echo "Redis failed to start within $redis_timeout seconds"
            docker compose --profile ci logs redis
            exit 1
          fi

          # wait for clamav to be ready
          echo "Waiting for ClamAV to be ready..."
          clamav_timeout=60
          clamav_counter=0
          while [ $clamav_counter -lt $clamav_timeout ]; do
            if docker compose --profile ci exec -T clamav clamdscan --version > /dev/null 2>&1; then
              echo "ClamAV is ready!"
              break
            fi
            echo "ClamAV not ready yet, waiting... ($clamav_counter/$clamav_timeout)"
            sleep 2
            clamav_counter=$((clamav_counter + 2))
          done

          if [ $clamav_counter -eq $clamav_timeout ]; then
            echo "ClamAV failed to start within $clamav_timeout seconds"
            docker compose --profile ci logs clamav
            exit 1
          fi

      - name: Run migration checks and apply migrations (Postgres)
        run: |
          docker compose exec backend sh -c "
            echo 'Checking for missing migrations...' &&
            python manage.py makemigrations --check --dry-run --settings=backend.ci_settings &&
            echo 'Applying migrations...' &&
            python manage.py migrate --noinput --settings=backend.ci_settings
          "

      - name: Wait for app on localhost
        run: |
          echo "Waiting for http://localhost/ ..."
          for i in $(seq 1 90); do
            if curl -fsS --max-time 5 http://localhost/ > /dev/null 2>&1; then
              echo "OK"
              exit 0
            fi
            sleep 2
          done
          echo "Timeout waiting for nginx/frontend"
          docker compose --profile ci logs nginx --tail 80 || true
          docker compose --profile ci logs frontend --tail 80 || true
          exit 1

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies and run Lighthouse
        working-directory: frontend
        env:
          LHCI_AUTH_EMAIL: ${{ secrets.LHCI_AUTH_EMAIL }}
          LHCI_AUTH_PASSWORD: ${{ secrets.LHCI_AUTH_PASSWORD }}
          CI: true
        run: |
          npm ci
          npm run lighthouse:local

      - name: Upload Lighthouse reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-reports-${{ github.sha }}
          path: frontend/.lighthouseci/
          if-no-files-found: warn
          retention-days: 14

      - name: Docker compose logs (on failure)
        if: failure()
        run: |
          echo "=== docker compose ps ==="
          docker compose --profile ci ps -a || true
          echo "=== backend (last 250 lines) ==="
          docker compose --profile ci logs backend --tail 250 || true
          echo "=== nginx (last 120 lines) ==="
          docker compose --profile ci logs nginx --tail 120 || true

      - name: Cleanup containers
        if: always()
        run: |
          docker compose --profile ci down -v || true
          docker system prune -f || true
