# Lighthouse CI — push/PR to `lighthouse-ci-test`.
# Secrets required: LHCI_AUTH_EMAIL, LHCI_AUTH_PASSWORD (Settings → Secrets → Actions).
# See frontend/LIGHTHOUSE_README.md for full setup and design notes.
name: Lighthouse CI

on:
  push:
    branches: [main, prod-preview]
  pull_request:
    branches: [main, prod-preview]

concurrency:
  group: lighthouse-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

# Force all JS actions onto the Node 24 runtime.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      # https://docs.docker.com/build/ci/github-actions/build-summary/#disable-job-summary
      DOCKER_BUILD_SUMMARY: false
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build backend image
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          tags: mediajira-backend:${{ github.sha }}
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v7
        with:
          context: ./frontend
          tags: mediajira-frontend:${{ github.sha }}
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create CI environment file
        run: |
          cat > .env << EOF
          SECRET_KEY=test-secret-key-for-ci-${{ github.sha }}
          POSTGRES_DB=mediajira_test_db
          POSTGRES_USER=postgres
          POSTGRES_PASSWORD=test_password
          POSTGRES_PORT=5432
          DB_HOST=db
          API_BASE_URL=http://nginx
          DEBUG=False
          ALLOWED_HOSTS=localhost,127.0.0.1,0.0.0.0
          CELERY_BROKER_URL=redis://redis:6379/0
          CELERY_RESULT_BACKEND=redis://redis:6379/0
          CLAMAV_HOST=clamav
          CLAMAV_PORT=3310
          OTEL_SDK_DISABLED=true
          OTEL_TRACES_EXPORTER=none
          OTEL_METRICS_EXPORTER=none
          OTEL_LOGS_EXPORTER=none
          EOF

      - name: Start all services
        run: docker compose --profile ci --env-file .env up -d

      - name: Wait for database, Redis and ClamAV
        run: |
          echo "Waiting for database..."
          timeout=180
          counter=0
          while [ $counter -lt $timeout ]; do
            if docker compose --profile ci exec -T db pg_isready -U postgres > /dev/null 2>&1; then
              echo "Database ready."
              break
            fi
            sleep 2
            counter=$((counter + 2))
          done
          if [ $counter -eq $timeout ]; then
            docker compose --profile ci logs db
            exit 1
          fi

          echo "Waiting for Redis..."
          redis_timeout=30
          redis_counter=0
          while [ $redis_counter -lt $redis_timeout ]; do
            if docker compose --profile ci exec -T redis redis-cli ping > /dev/null 2>&1; then
              echo "Redis ready."
              break
            fi
            sleep 1
            redis_counter=$((redis_counter + 1))
          done
          if [ $redis_counter -eq $redis_timeout ]; then
            docker compose --profile ci logs redis
            exit 1
          fi

          echo "Waiting for ClamAV..."
          clamav_timeout=60
          clamav_counter=0
          while [ $clamav_counter -lt $clamav_timeout ]; do
            if docker compose --profile ci exec -T clamav clamdscan --version > /dev/null 2>&1; then
              echo "ClamAV ready."
              break
            fi
            sleep 2
            clamav_counter=$((clamav_counter + 2))
          done
          if [ $clamav_counter -eq $clamav_timeout ]; then
            docker compose --profile ci logs clamav
            exit 1
          fi

      # Run without --settings=backend.ci_settings — see LIGHTHOUSE_README.md § CI design decisions.
      - name: Run migrations (Postgres)
        run: |
          docker compose exec backend sh -c "
            python manage.py makemigrations --noinput &&
            python manage.py makemigrations --merge --noinput &&
            python manage.py migrate --noinput
          "

      - name: Seed default plans (Free/Pro/Ultimate)
        run: |
          docker compose exec backend python manage.py shell -c \
            "from stripe_meta.stripe_utils import initialize_default_plans; initialize_default_plans(); print('Plans seeded OK')"

      - name: Verify backend is ready
        run: |
          for i in $(seq 1 30); do
            if docker compose --profile ci exec -T backend python manage.py shell -c "from django.contrib.auth.models import User; print('DB OK')" > /dev/null 2>&1; then
              echo "Backend ready."
              exit 0
            fi
            sleep 2
          done
          docker compose --profile ci logs backend --tail 100
          exit 1

      - name: Wait for app on localhost
        run: |
          for i in $(seq 1 90); do
            if curl -fsS --max-time 5 http://localhost/ > /dev/null 2>&1; then
              echo "OK"
              exit 0
            fi
            sleep 2
          done
          docker compose --profile ci logs nginx --tail 80 || true
          docker compose --profile ci logs frontend --tail 80 || true
          exit 1

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies and run Lighthouse
        working-directory: frontend
        env:
          LHCI_AUTH_EMAIL: ${{ secrets.LHCI_AUTH_EMAIL }}
          LHCI_AUTH_PASSWORD: ${{ secrets.LHCI_AUTH_PASSWORD }}
          CI: true
        run: |
          npm ci
          npm run lighthouse:local

      - name: Upload Lighthouse reports
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: lighthouse-reports-${{ github.sha }}
          path: frontend/.lighthouseci/
          if-no-files-found: warn
          retention-days: 14
          include-hidden-files: true

      - name: Docker compose logs (on failure)
        if: failure()
        run: |
          docker compose --profile ci ps -a || true
          docker compose --profile ci logs backend --tail 250 || true
          docker compose --profile ci logs nginx --tail 120 || true

      - name: Cleanup containers
        if: always()
        run: |
          docker compose --profile ci down -v || true
          docker system prune -f || true
