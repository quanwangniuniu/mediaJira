openapi: 3.0.3
info:
  title: Meeting Preparation Workspace API
  version: 0.1.0
  description: >
    Backend API for SMP-484 Meeting Preparation Workspace.
    All meeting resources are strictly scoped by project_id.

servers:
  - url: http://localhost:8000/

tags:
  - name: Meetings
  - name: AgendaItems
  - name: Participants
  - name: Artifacts

paths:
  /projects/{project_id}/meetings/:
    get:
      tags: [Meetings]
      summary: List meetings in a project
      parameters:
        - $ref: '#/components/parameters/ProjectIdPath'
      responses:
        '200':
          description: List of meetings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Meeting'
    post:
      tags: [Meetings]
      summary: Create a meeting in a project
      parameters:
        - $ref: '#/components/parameters/ProjectIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MeetingCreate'
      responses:
        '201':
          description: Created meeting
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Meeting'

  /projects/{project_id}/meetings/{meeting_id}/:
    get:
      tags: [Meetings]
      summary: Retrieve a meeting
      parameters:
        - $ref: '#/components/parameters/ProjectIdPath'
        - $ref: '#/components/parameters/MeetingIdPath'
      responses:
        '200':
          description: Meeting details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Meeting'
    put:
      tags: [Meetings]
      summary: Update a meeting (full)
      parameters:
        - $ref: '#/components/parameters/ProjectIdPath'
        - $ref: '#/components/parameters/MeetingIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MeetingUpdate'
      responses:
        '200':
          description: Updated meeting
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Meeting'
    patch:
      tags: [Meetings]
      summary: Partially update a meeting
      description: Supports partial edits of meeting fields.
      parameters:
        - $ref: '#/components/parameters/ProjectIdPath'
        - $ref: '#/components/parameters/MeetingIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MeetingPartialUpdate'
      responses:
        '200':
          description: Partially updated meeting
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Meeting'
    delete:
      tags: [Meetings]
      summary: Delete a meeting
      parameters:
        - $ref: '#/components/parameters/ProjectIdPath'
        - $ref: '#/components/parameters/MeetingIdPath'
      responses:
        '204':
          description: Meeting deleted

  /projects/{project_id}/meetings/{meeting_id}/agenda-items/:
    get:
      tags: [AgendaItems]
      summary: List agenda items of a meeting
      parameters:
        - $ref: '#/components/parameters/ProjectIdPath'
        - $ref: '#/components/parameters/MeetingIdPath'
      responses:
        '200':
          description: List of agenda items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AgendaItem'
    post:
      tags: [AgendaItems]
      summary: Create an agenda item
      parameters:
        - $ref: '#/components/parameters/ProjectIdPath'
        - $ref: '#/components/parameters/MeetingIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgendaItemCreate'
      responses:
        '201':
          description: Created agenda item
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgendaItem'

  /projects/{project_id}/meetings/{meeting_id}/agenda-items/{agenda_item_id}/:
    get:
      tags: [AgendaItems]
      summary: Retrieve an agenda item
      parameters:
        - $ref: '#/components/parameters/ProjectIdPath'
        - $ref: '#/components/parameters/MeetingIdPath'
        - $ref: '#/components/parameters/AgendaItemIdPath'
      responses:
        '200':
          description: Agenda item details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgendaItem'
    put:
      tags: [AgendaItems]
      summary: Update an agenda item (full)
      parameters:
        - $ref: '#/components/parameters/ProjectIdPath'
        - $ref: '#/components/parameters/MeetingIdPath'
        - $ref: '#/components/parameters/AgendaItemIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgendaItemUpdate'
      responses:
        '200':
          description: Updated agenda item
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgendaItem'
    patch:
      tags: [AgendaItems]
      summary: Partially update an agenda item
      description: Supports partial edits of agenda item fields.
      parameters:
        - $ref: '#/components/parameters/ProjectIdPath'
        - $ref: '#/components/parameters/MeetingIdPath'
        - $ref: '#/components/parameters/AgendaItemIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgendaItemPartialUpdate'
      responses:
        '200':
          description: Partially updated agenda item
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgendaItem'
    delete:
      tags: [AgendaItems]
      summary: Delete an agenda item
      parameters:
        - $ref: '#/components/parameters/ProjectIdPath'
        - $ref: '#/components/parameters/MeetingIdPath'
        - $ref: '#/components/parameters/AgendaItemIdPath'
      responses:
        '204':
          description: Agenda item deleted

  /projects/{project_id}/meetings/{meeting_id}/agenda-items/reorder/:
    patch:
      tags: [AgendaItems]
      summary: Reorder agenda items
      description: >
        Batch update order_index for multiple agenda items in a single operation.
        Must preserve unique (meeting, order_index) constraint and avoid ordering corruption.
      parameters:
        - $ref: '#/components/parameters/ProjectIdPath'
        - $ref: '#/components/parameters/MeetingIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgendaItemsReorderRequest'
      responses:
        '200':
          description: Reordered agenda items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AgendaItem'

  /projects/{project_id}/meetings/{meeting_id}/participants/:
    get:
      tags: [Participants]
      summary: List participants of a meeting
      parameters:
        - $ref: '#/components/parameters/ProjectIdPath'
        - $ref: '#/components/parameters/MeetingIdPath'
      responses:
        '200':
          description: List of participant links
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ParticipantLink'
    post:
      tags: [Participants]
      summary: Add a participant to a meeting
      description: >
        Link a user as a participant of the meeting.
        Enforces unique (meeting, user) constraint.
      parameters:
        - $ref: '#/components/parameters/ProjectIdPath'
        - $ref: '#/components/parameters/MeetingIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ParticipantLinkCreate'
      responses:
        '201':
          description: Created participant link
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ParticipantLink'

  /projects/{project_id}/meetings/{meeting_id}/participants/{participant_link_id}/:
    patch:
      tags: [Participants]
      summary: Partially update a participant link
      description: Typically used to update the role field.
      parameters:
        - $ref: '#/components/parameters/ProjectIdPath'
        - $ref: '#/components/parameters/MeetingIdPath'
        - $ref: '#/components/parameters/ParticipantLinkIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ParticipantLinkPartialUpdate'
      responses:
        '200':
          description: Updated participant link
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ParticipantLink'
    delete:
      tags: [Participants]
      summary: Remove a participant from a meeting
      parameters:
        - $ref: '#/components/parameters/ProjectIdPath'
        - $ref: '#/components/parameters/MeetingIdPath'
        - $ref: '#/components/parameters/ParticipantLinkIdPath'
      responses:
        '204':
          description: Participant link deleted

  /projects/{project_id}/meetings/{meeting_id}/artifacts/:
    get:
      tags: [Artifacts]
      summary: List artifact links of a meeting
      parameters:
        - $ref: '#/components/parameters/ProjectIdPath'
        - $ref: '#/components/parameters/MeetingIdPath'
      responses:
        '200':
          description: List of artifact links
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ArtifactLink'
    post:
      tags: [Artifacts]
      summary: Link an artifact to a meeting
      description: >
        Attach an operational artifact (Decision, Task, Snapshot, Tag, etc.) to a meeting.
        Enforces unique (meeting, artifact_type, artifact_id) constraint.
      parameters:
        - $ref: '#/components/parameters/ProjectIdPath'
        - $ref: '#/components/parameters/MeetingIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ArtifactLinkCreate'
      responses:
        '201':
          description: Created artifact link
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArtifactLink'

  /projects/{project_id}/meetings/{meeting_id}/artifacts/{artifact_link_id}/:
    delete:
      tags: [Artifacts]
      summary: Remove an artifact link from a meeting
      parameters:
        - $ref: '#/components/parameters/ProjectIdPath'
        - $ref: '#/components/parameters/MeetingIdPath'
        - $ref: '#/components/parameters/ArtifactLinkIdPath'
      responses:
        '204':
          description: Artifact link deleted

components:
  parameters:
    ProjectIdPath:
      name: project_id
      in: path
      required: true
      schema:
        type: integer
      description: ID of the project scope for this request.
    MeetingIdPath:
      name: meeting_id
      in: path
      required: true
      schema:
        type: integer
      description: ID of the meeting.
    AgendaItemIdPath:
      name: agenda_item_id
      in: path
      required: true
      schema:
        type: integer
      description: ID of the agenda item.
    ParticipantLinkIdPath:
      name: participant_link_id
      in: path
      required: true
      schema:
        type: integer
      description: ID of the participant link.
    ArtifactLinkIdPath:
      name: artifact_link_id
      in: path
      required: true
      schema:
        type: integer
      description: ID of the artifact link.

  schemas:
    MeetingStatus:
      type: string
      enum: [draft]
      description: >
        Status of the meeting. For SMP-484 only "draft" is supported.
    Meeting:
      type: object
      required:
        - id
        - project
        - title
        - meeting_type
        - objective
        - status
      properties:
        id:
          type: integer
        project:
          type: integer
          description: Foreign key to core.Project (project_id).
        title:
          type: string
          maxLength: 255
        meeting_type:
          type: string
          maxLength: 100
        objective:
          type: string
        scheduled_date:
          type: string
          format: date
          nullable: true
        scheduled_time:
          type: string
          format: time
          nullable: true
        external_reference:
          type: string
          maxLength: 255
          nullable: true
        status:
          $ref: '#/components/schemas/MeetingStatus'

    MeetingCreate:
      type: object
      required:
        - title
        - meeting_type
        - objective
      properties:
        title:
          type: string
          maxLength: 255
        meeting_type:
          type: string
          maxLength: 100
        objective:
          type: string
        scheduled_date:
          type: string
          format: date
          nullable: true
        scheduled_time:
          type: string
          format: time
          nullable: true
        external_reference:
          type: string
          maxLength: 255
          nullable: true
        status:
          $ref: '#/components/schemas/MeetingStatus'
          description: >
            Optional on create. If omitted, defaults to "draft".

    MeetingUpdate:
      type: object
      required:
        - title
        - meeting_type
        - objective
        - status
      properties:
        title:
          type: string
          maxLength: 255
        meeting_type:
          type: string
          maxLength: 100
        objective:
          type: string
        scheduled_date:
          type: string
          format: date
          nullable: true
        scheduled_time:
          type: string
          format: time
          nullable: true
        external_reference:
          type: string
          maxLength: 255
          nullable: true
        status:
          $ref: '#/components/schemas/MeetingStatus'

    MeetingPartialUpdate:
      type: object
      properties:
        title:
          type: string
          maxLength: 255
        meeting_type:
          type: string
          maxLength: 100
        objective:
          type: string
        scheduled_date:
          type: string
          format: date
          nullable: true
        scheduled_time:
          type: string
          format: time
          nullable: true
        external_reference:
          type: string
          maxLength: 255
          nullable: true
        status:
          $ref: '#/components/schemas/MeetingStatus'

    AgendaItem:
      type: object
      required:
        - id
        - meeting
        - content
        - order_index
        - is_priority
      properties:
        id:
          type: integer
        meeting:
          type: integer
          description: Foreign key to Meeting.
        content:
          type: string
        order_index:
          type: integer
          minimum: 0
        is_priority:
          type: boolean
          default: false

    AgendaItemCreate:
      type: object
      required:
        - content
        - order_index
      properties:
        content:
          type: string
        order_index:
          type: integer
          minimum: 0
        is_priority:
          type: boolean
          default: false

    AgendaItemUpdate:
      type: object
      required:
        - content
        - order_index
        - is_priority
      properties:
        content:
          type: string
        order_index:
          type: integer
          minimum: 0
        is_priority:
          type: boolean

    AgendaItemPartialUpdate:
      type: object
      properties:
        content:
          type: string
        order_index:
          type: integer
          minimum: 0
        is_priority:
          type: boolean

    AgendaItemsReorderRequest:
      type: object
      required:
        - items
      properties:
        items:
          type: array
          description: >
            Array of agenda items with their new order_index values for this meeting.
          items:
            type: object
            required:
              - id
              - order_index
            properties:
              id:
                type: integer
                description: AgendaItem ID.
              order_index:
                type: integer
                minimum: 0
                description: New order_index for this item.

    ParticipantLink:
      type: object
      required:
        - id
        - meeting
        - user
      properties:
        id:
          type: integer
        meeting:
          type: integer
          description: Foreign key to Meeting.
        user:
          type: integer
          description: Foreign key to AUTH_USER_MODEL (core.CustomUser).
        role:
          type: string
          maxLength: 100
          nullable: true

    ParticipantLinkCreate:
      type: object
      required:
        - user
      properties:
        user:
          type: integer
        role:
          type: string
          maxLength: 100
          nullable: true

    ParticipantLinkPartialUpdate:
      type: object
      properties:
        role:
          type: string
          maxLength: 100
          nullable: true

    ArtifactLink:
      type: object
      required:
        - id
        - meeting
        - artifact_type
        - artifact_id
      properties:
        id:
          type: integer
        meeting:
          type: integer
          description: Foreign key to Meeting.
        artifact_type:
          type: string
          maxLength: 50
          description: >
            Type of the linked artifact (e.g., decision, task, snapshot, tag).
        artifact_id:
          type: integer
          description: ID of the linked artifact in its own domain.

    ArtifactLinkCreate:
      type: object
      required:
        - artifact_type
        - artifact_id
      properties:
        artifact_type:
          type: string
          maxLength: 50
        artifact_id:
          type: integer

